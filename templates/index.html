<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #38bdf8;
        }

        input {
            padding: 12px;
            width: 350px;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
            font-size: 16px;
        }

        .box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .safe {
            background: #16a34a;
        }

        .phishing {
            background: #dc2626;
        }
    </style>
</head>

<body>

    <h1>🔐 Phishing Website Detector</h1>
    <p>Real-time URL Security Analysis</p>

    <input type="text" id="urlInput" placeholder="Enter URL here..." onkeyup="checkURL()">

    <div id="resultBox" class="box">
        <h2 id="resultText"></h2>
        <p id="confidenceText"></p>
        <p id="riskText"></p>
        <p id="riskLevel"></p> <!-- Optional upgrade -->
    </div>

    <script>
        function checkURL() {
            let url = document.getElementById("urlInput").value;

            if (url.length < 5) return;

            fetch("/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({url: url})
            })
            .then(res => res.json())
            .then(data => {

                let box = document.getElementById("resultBox");
                box.style.display = "block";

                document.getElementById("resultText").innerText = "Result: " + data.result;
                document.getElementById("confidenceText").innerText = "Confidence: " + data.confidence + "%";
                document.getElementById("riskText").innerText = "Risk Score: " + data.risk + "/100";

                // Risk Level (OPTIONAL UPGRADE)
                let riskLevel = data.risk > 60 ? "HIGH ⚠️" : "LOW ✅";
                document.getElementById("riskLevel").innerText = "Risk Level: " + riskLevel;

                // Color change
                if (data.result === "PHISHING") {
                    box.className = "box phishing";
                } else {
                    box.className = "box safe";
                }
            });
        }
    </script>

</body>
</html>
